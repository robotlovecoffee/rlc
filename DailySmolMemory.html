<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#121212" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>DailySmol Memory Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #e0e0e0;
        --accent-color: #bb86fc;
        --secondary-color: #03dac6;
        --error-color: #cf6679;
        --card-border: #333;
        --card-hover: #444;
        --font-main: 'Outfit', sans-serif;
      }

      body {
        font-family: var(--font-main);
        background: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 5px;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        justify-content: space-between;
      }

      /* Controls & Stats Container */
      .game-header {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 15px;
        width: 100%;
        max-width: 800px;
        margin-bottom: 20px;
        flex-shrink: 0;
        z-index: 10;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -1px;
        background: linear-gradient(45deg, var(--accent-color), var(--secondary-color));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        white-space: nowrap;
      }

      .stats-bar {
        display: flex;
        gap: 15px;
        background: rgba(255, 255, 255, 0.05);
        padding: 8px 15px;
        border-radius: 50px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        white-space: nowrap;
      }

      .stat-item {
        font-size: 0.9rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      select, button {
        font-family: var(--font-main);
        font-size: 0.9rem;
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        outline: none;
      }

      select {
        background: #2c2c2c;
        color: #fff;
        border: 1px solid #444;
      }

      button {
        background: var(--accent-color);
        color: #000;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(187, 134, 252, 0.3);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(187, 134, 252, 0.4);
      }

      button.secondary {
        background: transparent;
        border: 1px solid var(--accent-color);
        color: var(--accent-color);
        box-shadow: none;
      }

      /* Grid */
      .grid {
        display: grid;
        grid-gap: 10px;
        justify-content: center;
        perspective: 1000px;
        margin: auto;
        flex-grow: 1;
        align-content: center;
        max-height: 100%;
        overflow-y: auto;
        width: 100%;
      }

      /* Dynamic grid columns based on difficulty */
      .grid.easy { grid-template-columns: repeat(4, 18vw); }
      .grid.medium { grid-template-columns: repeat(6, 13vw); }
      .grid.hard { grid-template-columns: repeat(6, 13vw); }

      .card {
        background: transparent;
        cursor: pointer;
        position: relative;
        aspect-ratio: 5/7;
        width: 100%;
      }

      /* Desktop overrides */
      @media (min-width: 600px) {
        .grid.easy { grid-template-columns: repeat(4, 100px); }
        .grid.medium { grid-template-columns: repeat(6, 80px); }
        .grid.hard { grid-template-columns: repeat(6, 60px); }
        
        .grid.easy .card { width: 100px; }
        .grid.medium .card { width: 80px; }
        .grid.hard .card { width: 60px; }
      }

      .card-inner {
        width: 100%;
        height: 100%;
        position: relative;
        transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
        transform-style: preserve-3d;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      }

      .card.flipped .card-inner {
        transform: rotateY(180deg);
      }
      
      .card.matched .card-inner {
        transform: rotateY(180deg);
        animation: pulse-match 0.5s ease-out;
      }

      @keyframes pulse-match {
        0% { transform: rotateY(180deg) scale(1); box-shadow: 0 0 0 0 rgba(3, 218, 198, 0.7); }
        50% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 0 0 15px rgba(3, 218, 198, 0); }
        100% { transform: rotateY(180deg) scale(1); }
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255,255,255,0.1);
      }

      .card-front {
        background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
      }
      
      .card-front::after {
        content: '?';
        font-size: 1.5rem;
        color: rgba(255,255,255,0.1);
        font-weight: 800;
      }

      .card-back {
        background: #000;
        transform: rotateY(180deg);
      }
      
      .card-back img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Mobile adjustments */
      @media (max-width: 600px) {
        body { padding: 2px; }
        
        /* Compact Footer Bar */
        .game-header {
          order: 2;
          margin: 0;
          padding: 5px;
          background: #121212;
          border-top: 1px solid #333;
          width: 100%;
          justify-content: space-between;
          gap: 5px;
          flex-wrap: nowrap;
        }

        h1 { font-size: 1rem; margin-right: 5px; }
        
        .stats-bar {
          padding: 2px 8px;
          gap: 8px;
          font-size: 0.8rem;
          background: transparent;
          border: none;
          box-shadow: none;
        }
        
        .stat-item { font-size: 0.8rem; }
        
        .controls { gap: 5px; }
        
        select, button {
          padding: 4px 8px;
          font-size: 0.75rem;
          height: 28px;
        }
        
        /* Hide text on mobile button if needed, or keep it small */
        #start-btn { white-space: nowrap; }

        .grid { order: 1; grid-gap: 4px; align-content: center; }
        
        /* Ensure hard mode fits vertically */
        .grid.hard { grid-template-columns: repeat(6, 14vw); grid-gap: 2px; }
      }

      /* Leaderboard */
      .leaderboard-panel {
        background: #1e1e1e;
        border-radius: 16px;
        padding: 20px;
        width: 100%;
        max-width: 400px;
        border: 1px solid #333;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
      }
      
      .leaderboard-header {
        text-align: center;
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 15px;
        color: var(--secondary-color);
      }

      .leaderboard-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .leaderboard-item {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        background: rgba(255,255,255,0.03);
        border-radius: 8px;
        font-size: 0.9rem;
      }
      
      .leaderboard-item.new {
        background: rgba(3, 218, 198, 0.15);
        border: 1px solid rgba(3, 218, 198, 0.3);
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 1000;
        backdrop-filter: blur(5px);
      }

      .modal-overlay.visible {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-content {
        background: #1e1e1e;
        padding: 40px;
        border-radius: 24px;
        text-align: center;
        max-width: 90%;
        width: 350px;
        transform: scale(0.9);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        border: 1px solid #333;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }

      .modal-overlay.visible .modal-content {
        transform: scale(1);
      }

      .modal-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 10px;
        background: linear-gradient(45deg, var(--secondary-color), var(--accent-color));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .modal-stats {
        margin: 20px 0;
        font-size: 1.1rem;
        color: #aaa;
      }

      .modal-stats span {
        color: #fff;
        font-weight: 700;
      }

      /* Confetti Canvas */
      #confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <canvas id="confetti-canvas"></canvas>

    <div class="game-header">
      <h1>DailySmol Match</h1>
      <div class="stats-bar" id="game-stats" style="opacity: 0.5;">
        <div class="stat-item">
          <span>🔄</span> <span id="turn-display">0</span>
        </div>
        <div class="stat-item">
          <span>⏱️</span> <span id="time-display">0s</span>
        </div>
      </div>
      <div class="controls">
        <select id="difficulty-select">
          <option value="easy">Easy (4x4)</option>
          <option value="medium" selected>Medium (6x4)</option>
          <option value="hard">Hard (6x6)</option>
        </select>
        <button id="start-btn">New</button>
        <button id="quit-btn" class="secondary" style="display: none;">Quit</button>
      </div>
    </div>

    <div class="grid medium" id="game-grid"></div>

    <div class="leaderboard-panel" id="leaderboard">
      <div class="leaderboard-header">🏆 Top Scores</div>
      <div class="leaderboard-list" id="leaderboard-list">
        <!-- Entries injected here -->
      </div>
    </div>

    <!-- Win Modal -->
    <div class="modal-overlay" id="win-modal">
      <div class="modal-content">
        <div class="modal-title">Victory!</div>
        <div class="modal-stats">
          <p>Time: <span id="final-time">0s</span></p>
          <p>Turns: <span id="final-turns">0</span></p>
        </div>
        <button id="play-again-btn">Play Again</button>
        <button id="close-modal-btn" class="secondary" style="margin-top: 10px;">Close</button>
      </div>
    </div>

    <script>
      // --- Audio System ---
      // Simple synthesized sounds using Web Audio API to avoid external assets
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'flip') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
          gainNode.gain.setValueAtTime(0.1, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
        } else if (type === 'match') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.setValueAtTime(600, now + 0.1);
          osc.frequency.setValueAtTime(1000, now + 0.2);
          gainNode.gain.setValueAtTime(0.1, now);
          gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } else if (type === 'win') {
          // Arpeggio
          [440, 554, 659, 880].forEach((freq, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, now + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
            o.start(now + i * 0.1);
            o.stop(now + i * 0.1 + 0.3);
          });
        }
      }

      // --- Game Logic ---
      const images = [
        "https://arweave.net/8kjUf9dqj7lcapLEy-6wlCO4XeN327EKY9gU3NiL2YI",
        "https://arweave.net/120LHHjKeZdiNrBR2YT1rhpy1xcAuO8CLac9fh7DUYw",
        "https://arweave.net/6LjnT7Zu_gvecESWCz6Sh64yNop1uN-9GU2Bdj4bdGY",
        "https://arweave.net/QL-dxWazKGrb8-1lLrk7NhXO8_vPwF6LfAt_0fSCJgk",
        "https://arweave.net/AeeYLMPICzQvtf3PC0AQiACsOwDhLoOODC5wttc5Tsk",
        "https://arweave.net/gwEqCsaBEbYSdkub4ugErB4to2Pa86wvZ9bxSHVoZEg",
        "https://arweave.net/NYv_3rcBuBEBg4B0LbxgWt6uYtczKGy27pEvjA4h85w",
        "https://arweave.net/Y706rh6qBFiMbmQc3bYe38OHtPW4OFQGpQvefBzfguA",
        "https://arweave.net/UCZ9FcH-1zCfd9sYGXOquILQNU_LBbtAP0botxifscs",
        "https://arweave.net/s1U7T6vwu1H1NZHva0-bJu2pZv3IT8uGlgsbNEaUx0g",
        "https://arweave.net/cPTgE7hCE96w2fIKoW4ciUTiA8gYBqbdxYZmPlNoED8",
        "https://arweave.net/MtrgKfZjtXdq1My3-phzoicspVgEMXnhz5XMwaCzmvI",
        "https://arweave.net/3B-41elHuEWrqUyLsXQD2kknMOTP8EDHj78iSohnhag",
        "https://arweave.net/G_Jrl3OfaRgeIeSfD23WVHv_uxbDzx5qXtWMyPqKa7A",
        "https://arweave.net/RmmP8vnEpKUhNqgkpGoiZn50ux-ThN1388XJJdURNWM",
        "https://arweave.net/UD2-EbbwO6nhu5RuzelqMvv4VCofM-GB0GmPlcIDDhI",
        "https://arweave.net/y4grMOHUDvU7k8J_TBLBmmQqTR8s_bAer5xgeVcjHYc",
        "https://arweave.net/5FpHMb6NXBhCvgfNjQ-IYmPLJaM_8iogUNL44gAvOPY",
        "https://arweave.net/dA18U4RdAaA7XEY7OPeLImmPBE0WS4J09Ib9Vyr9B80",
        "https://arweave.net/2ApD9AQ1qUajg2mvBTpsknjF23lW8n437ekflcjIbhg",
        "https://arweave.net/zEd392MZTIkk8fWf-lavo1lROhJ-deKVFT4dbV7wXaU",
        "https://arweave.net/2teh1PfBSrC0MvULzWhSOfgzYkUIG860eicvVr2XgsE",
        "https://arweave.net/jbA44FWI7RoNvte9WLBZSAF5NsnNryhcSGrkeUipRYU",
        "https://arweave.net/tCvQZ4TASF6sMghMHdsxwdGB4TJ3AY-V8jlO8Vhp0FQ",
        "https://arweave.net/9Xd-73pE06vq2-SH8D34h_ulfEHstZSaHAgCvSLfo0w",
        "https://arweave.net/aoM9U4-zc_7aeN7PPXTRqsxjbgDPYa_T7dVMSyx3kos",
        "https://arweave.net/GrG7rNgD_FmTOKzuGc0GiJ32UzJlZy8WFQ_GxzEssyQ",
        "https://arweave.net/04fDVUEfnvs3wL3fACTqwygtGJi2bYbXgzRZOCq9Pkg",
        "https://arweave.net/pjq9HQt0FNCTEolKRbES0KKuj8f4v_GGsbgkUwuWNvs",
        "https://arweave.net/4Y-xs5kj4hQ8WVLdXdQ4laCMxBBDyva7ipJ6XA6NxJY"
      ];

      const difficulties = {
        easy: { rows: 4, cols: 4, pairs: 8 },
        medium: { rows: 4, cols: 6, pairs: 12 },
        hard: { rows: 6, cols: 6, pairs: 18 }
      };

      let state = {
        gameStarted: false,
        flippedCards: [],
        matchedPairs: 0,
        turns: 0,
        timer: 0,
        timerInterval: null,
        difficulty: 'medium',
        locked: false
      };

      // DOM Elements
      const grid = document.getElementById('game-grid');
      const startBtn = document.getElementById('start-btn');
      const quitBtn = document.getElementById('quit-btn');
      const diffSelect = document.getElementById('difficulty-select');
      const turnDisplay = document.getElementById('turn-display');
      const timeDisplay = document.getElementById('time-display');
      const statsBar = document.getElementById('game-stats');
      const modal = document.getElementById('win-modal');
      const leaderboardList = document.getElementById('leaderboard-list');
      const leaderboardPanel = document.getElementById('leaderboard');

      // Init
      initLeaderboard();

      // Event Listeners
      startBtn.addEventListener('click', startGame);
      quitBtn.addEventListener('click', quitGame);
      diffSelect.addEventListener('change', (e) => {
        state.difficulty = e.target.value;
        if (!state.gameStarted) {
          // Optional: preview grid size change?
          // For now just update the class
          grid.className = `grid ${state.difficulty}`;
        }
      });
      document.getElementById('play-again-btn').addEventListener('click', () => {
        closeModal();
        startGame();
      });
      document.getElementById('close-modal-btn').addEventListener('click', () => {
        closeModal();
        quitGame();
      });

      function startGame() {
        state.gameStarted = true;
        state.flippedCards = [];
        state.matchedPairs = 0;
        state.turns = 0;
        state.timer = 0;
        state.locked = false;
        
        clearInterval(state.timerInterval);
        state.timerInterval = setInterval(updateTimer, 1000);

        updateUIState(true);
        renderGrid();
      }

      function quitGame() {
        state.gameStarted = false;
        clearInterval(state.timerInterval);
        updateUIState(false);
        grid.innerHTML = '';
        leaderboardPanel.style.display = 'block';
      }

      function updateUIState(playing) {
        startBtn.style.display = playing ? 'none' : 'inline-block';
        quitBtn.style.display = playing ? 'inline-block' : 'none';
        diffSelect.disabled = playing;
        statsBar.style.opacity = playing ? '1' : '0.5';
        turnDisplay.textContent = state.turns;
        timeDisplay.textContent = '0s';
        
        if (playing) {
          leaderboardPanel.style.display = 'none';
          grid.className = `grid ${state.difficulty}`;
        }
      }

      function updateTimer() {
        state.timer++;
        timeDisplay.textContent = `${state.timer}s`;
      }

      function renderGrid() {
        const config = difficulties[state.difficulty];
        const gameImages = getRandomImages(config.pairs);
        const cards = shuffle([...gameImages, ...gameImages]); // Pairs

        grid.innerHTML = '';
        cards.forEach((img, index) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.dataset.index = index;
          card.dataset.image = img;
          
          card.innerHTML = `
            <div class="card-inner">
              <div class="card-face card-front"></div>
              <div class="card-face card-back">
                <img src="${img}" alt="memory card">
              </div>
            </div>
          `;
          
          card.addEventListener('click', () => handleCardClick(card));
          grid.appendChild(card);
        });
      }

      function handleCardClick(card) {
        if (!state.gameStarted || state.locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;

        playSound('flip');
        card.classList.add('flipped');
        state.flippedCards.push(card);

        if (state.flippedCards.length === 2) {
          state.turns++;
          turnDisplay.textContent = state.turns;
          checkForMatch();
        }
      }

      function checkForMatch() {
        state.locked = true;
        const [card1, card2] = state.flippedCards;
        const match = card1.dataset.image === card2.dataset.image;

        if (match) {
          playSound('match');
          card1.classList.add('matched');
          card2.classList.add('matched');
          state.matchedPairs++;
          state.flippedCards = [];
          state.locked = false;

          if (state.matchedPairs === difficulties[state.difficulty].pairs) {
            handleWin();
          }
        } else {
          setTimeout(() => {
            card1.classList.remove('flipped');
            card2.classList.remove('flipped');
            state.flippedCards = [];
            state.locked = false;
          }, 1000);
        }
      }

      function handleWin() {
        clearInterval(state.timerInterval);
        playSound('win');
        fireConfetti();
        
        document.getElementById('final-time').textContent = `${state.timer}s`;
        document.getElementById('final-turns').textContent = state.turns;
        
        saveScore(state.difficulty, state.turns, state.timer);
        setTimeout(() => {
          modal.classList.add('visible');
        }, 500);
      }

      function closeModal() {
        modal.classList.remove('visible');
      }

      // Helpers
      function getRandomImages(count) {
        return [...images].sort(() => 0.5 - Math.random()).slice(0, count);
      }

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      // Leaderboard
      function initLeaderboard() {
        updateLeaderboardDisplay();
      }

      function saveScore(diff, turns, time) {
        const scores = JSON.parse(localStorage.getItem('memoryScores') || '[]');
        scores.push({
          difficulty: diff,
          turns,
          time,
          date: new Date().toISOString(),
          new: true
        });
        
        // Keep top 10 per difficulty
        const filtered = scores.sort((a, b) => a.turns - b.turns || a.time - b.time).slice(0, 50); // Store more, display less
        localStorage.setItem('memoryScores', JSON.stringify(filtered));
        updateLeaderboardDisplay();
      }

      function updateLeaderboardDisplay() {
        const scores = JSON.parse(localStorage.getItem('memoryScores') || '[]');
        // Filter by current difficulty selection if we wanted, but global top list is fine too
        // Let's show top 5 for current difficulty or just mixed? Mixed might be confusing.
        // Let's show top 5 recent/best.
        
        // Actually, let's show top 5 for the *current* difficulty selected in dropdown
        const currentDiff = diffSelect.value;
        const relevantScores = scores
          .filter(s => s.difficulty === currentDiff)
          .sort((a, b) => a.turns - b.turns || a.time - b.time)
          .slice(0, 5);

        leaderboardList.innerHTML = relevantScores.length ? '' : '<div style="text-align:center; color:#666; padding:10px;">No scores yet for this level</div>';
        
        relevantScores.forEach((score, i) => {
          const div = document.createElement('div');
          div.className = `leaderboard-item ${score.new ? 'new' : ''}`;
          if(score.new) delete score.new; // Clear flag after render logic
          
          div.innerHTML = `
            <span>#${i+1} ${score.difficulty.toUpperCase()}</span>
            <span>${score.turns} Turns / ${score.time}s</span>
          `;
          leaderboardList.appendChild(div);
        });
        
        // Clean up 'new' flags in storage
        localStorage.setItem('memoryScores', JSON.stringify(scores.map(s => ({...s, new: false}))));
      }
      
      // Update leaderboard when difficulty changes
      diffSelect.addEventListener('change', updateLeaderboardDisplay);

      // Confetti Effect (Simple version)
      function fireConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const colors = ['#bb86fc', '#03dac6', '#cf6679', '#ffffff'];
        
        for(let i=0; i<100; i++) {
          particles.push({
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10 - 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: Math.random() * 5 + 2,
            life: 100
          });
        }
        
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let active = false;
          
          particles.forEach(p => {
            if(p.life > 0) {
              active = true;
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.2; // gravity
              p.life--;
              
              ctx.fillStyle = p.color;
              ctx.globalAlpha = p.life / 100;
              ctx.fillRect(p.x, p.y, p.size, p.size);
            }
          });
          
          if(active) requestAnimationFrame(animate);
          else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        animate();
      }
    </script>
  </body>
